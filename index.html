<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Chat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.12);
            --accent: #a78bfa;
            --accent2: #38bdf8;
            --sent-bg: linear-gradient(135deg, #7c3aed, #4f46e5);
            --recv-bg: rgba(255,255,255,0.08);
            --text: #f1f5f9;
            --subtext: #94a3b8;
            --footer-bg: rgba(15,12,41,0.95);
            --header-bg: rgba(15,12,41,0.97);
            --input-bg: rgba(255,255,255,0.07);
        }

        .light-theme {
            --bg: linear-gradient(135deg, #e0f2fe, #f0e6ff, #fce4ec);
            --glass: rgba(255,255,255,0.55);
            --glass-border: rgba(100,80,200,0.18);
            --accent: #7c3aed;
            --accent2: #0ea5e9;
            --sent-bg: linear-gradient(135deg, #7c3aed, #a78bfa);
            --recv-bg: rgba(255,255,255,0.75);
            --text: #1e1b4b;
            --subtext: #6b7280;
            --footer-bg: rgba(230,220,255,0.97);
            --header-bg: rgba(230,220,255,0.97);
            --input-bg: rgba(255,255,255,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; height: 100dvh; overflow: hidden; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            height: 100%; height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
            padding-top: env(safe-area-inset-top);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 82%; position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .sent { align-self: flex-end; flex-direction: row-reverse; }
        .received { align-self: flex-start; }

        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; box-shadow: 0 0 0 2px var(--glass-border); }
        .bubble { padding: 10px 14px; border-radius: 18px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-border); cursor: pointer; transition: transform 0.15s; }
        .sent .bubble { background: var(--sent-bg); border-radius: 18px 18px 4px 18px; color: white; }
        .received .bubble { background: var(--recv-bg); border-radius: 18px 18px 18px 4px; color: var(--text); }
        .msg-body { display: flex; flex-direction: column; gap: 3px; }
        .name { font-size: 10px; font-weight: 700; opacity: 0.85; }
        .msg-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
        .meta { font-size: 9px; opacity: 0.55; text-align: right; margin-top: 2px; }

        .del-menu { display: none; position: absolute; bottom: 110%; background: rgba(20,15,50,0.97); border: 1px solid var(--glass-border); border-radius: 14px; z-index: 300; overflow: hidden; min-width: 170px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); backdrop-filter: blur(20px); }
        .sent .del-menu { right: 0; }
        .received .del-menu { left: 0; }
        .del-menu button { display: block; width: 100%; padding: 12px 16px; border: none; background: none; color: #f1f5f9; text-align: left; cursor: pointer; font-size: 13px; font-family: 'Sora', sans-serif; transition: background 0.2s; }
        .del-menu button:hover { background: rgba(167,139,250,0.15); }
        .del-menu button + button { border-top: 1px solid var(--glass-border); }

        .emoji-picker { display: none; position: absolute; bottom: 110%; background: rgba(20,15,50,0.97); border: 1px solid var(--glass-border); border-radius: 40px; z-index: 400; padding: 8px 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); backdrop-filter: blur(20px); gap: 6px; flex-direction: row; align-items: center; }
        .emoji-picker.show { display: flex; }
        .ep-btn { font-size: 22px; background: none; border: none; cursor: pointer; padding: 4px; border-radius: 50%; line-height: 1; }

        .reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .sent .reactions { justify-content: flex-end; }
        .received .reactions { justify-content: flex-start; }
        .react-badge { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2px 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 3px; backdrop-filter: blur(6px); }
        .react-badge.mine { border-color: var(--accent); background: rgba(167,139,250,0.2); }
        .react-count { font-size: 10px; font-weight: 600; opacity: 0.85; }

        .footer { display: flex; align-items: center; padding: 10px 14px; gap: 10px; background: var(--footer-bg); border-top: 1px solid var(--glass-border); flex-shrink: 0; }
        .footer input { flex: 1; padding: 12px 18px; border: 1px solid var(--glass-border); border-radius: 28px; outline: none; background: var(--input-bg); color: var(--text); font-family: 'Sora', sans-serif; font-size: 14px; backdrop-filter: blur(8px); }
        .send-btn { width: 46px; height: 46px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(167,139,250,0.4); }

        .header { background: var(--header-bg); border-top: 1px solid var(--glass-border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .brand-name { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-action { border: 1px solid var(--glass-border); background: var(--glass); color: var(--text); padding: 7px 13px; border-radius: 20px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; backdrop-filter: blur(8px); }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body id="mainBody">

    <div id="messages"></div>

    <div class="footer">
        <input type="text" id="inp" placeholder="پیغام لکھیں...">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

    <div class="header">
        <div class="header-brand">
            <div class="brand-icon">💬</div>
            <div>
                <div class="brand-name">Family Chat</div>
                <div style="font-size:10px; color:var(--subtext); display:flex; align-items:center; gap:4px;">
                    <span class="online-dot"></span> آن لائن
                </div>
            </div>
        </div>
        <div class="header-actions" style="display:flex; gap:8px;">
            <button class="btn-action" onclick="toggleTheme()">🌓 Theme</button>
            <button class="btn-action" style="border-color: #f87171; color: #f87171;" onclick="clearScreen()">🗑️ Clear</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = localStorage.getItem('user') || prompt("نام لکھیں:") || "Guest";
        localStorage.setItem('user', user);

        let hiddenMsgs = JSON.parse(localStorage.getItem('hiddenMsgs') || "[]");
        // EMOTIONAL EMOJIS ONLY
        const EMOJIS = ['❤️','🥰','🥺','🫂','✨','😢','🔥','🤲'];

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

        function clearScreen() {
            if(confirm("کیا آپ اپنی سکرین صاف کرنا چاہتے ہیں؟ میسجز سب کے پاس محفوظ رہیں گے۔")) {
                const currentMsgs = document.querySelectorAll('.msg');
                currentMsgs.forEach(m => {
                    const key = m.id.replace('msg-', '');
                    if(!hiddenMsgs.includes(key)) hiddenMsgs.push(key);
                    m.remove();
                });
                localStorage.setItem('hiddenMsgs', JSON.stringify(hiddenMsgs));
            }
        }

        function getColor(name) {
            const colors = ['#f43f5e','#a855f7','#6366f1','#0ea5e9','#10b981','#f59e0b','#ec4899','#8b5cf6'];
            return colors[name.charCodeAt(0) % colors.length];
        }

        function send() {
            let txt = document.getElementById('inp').value.trim();
            if(txt) {
                let now = new Date();
                let timeStr = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
                db.ref('chats').push({ name: user, text: txt, time: timeStr, timestamp: Date.now() });
                document.getElementById('inp').value = "";
            }
        }

        function closeAll() {
            document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.emoji-picker').forEach(p => p.classList.remove('show'));
        }

        let pressTimer = null;
        function onMsgPress(key) {
            pressTimer = setTimeout(() => {
                closeAll();
                const picker = document.getElementById('ep-' + key);
                if(picker) picker.classList.add('show');
            }, 450);
        }
        function onMsgRelease() { clearTimeout(pressTimer); }
        function onMsgTap(key) {
            closeAll();
            const menu = document.getElementById('menu-' + key);
            if(menu) menu.style.display = 'block';
        }

        function react(key, emoji) {
            closeAll();
            const ref = db.ref(`reactions/${key}/${encodeURIComponent(emoji)}/${user.replace(/[.#$[\]]/g,'_')}`);
            ref.once('value').then(snap => snap.exists() ? ref.remove() : ref.set(true));
        }

        function deleteForMe(key) {
            if(!hiddenMsgs.includes(key)) hiddenMsgs.push(key);
            localStorage.setItem('hiddenMsgs', JSON.stringify(hiddenMsgs));
            const el = document.getElementById('msg-' + key);
            if(el) el.remove();
            closeAll();
        }

        function deleteForEveryone(key) {
            if(confirm("کیا آپ یہ میسج سب کے لیے مٹانا چاہتے ہیں؟")) {
                db.ref(`chats/${key}`).remove();
                db.ref(`reactions/${key}`).remove();
            }
            closeAll();
        }

        function renderReactions(key, reactionsData) {
            const container = document.getElementById('reacts-' + key);
            if(!container) return;
            container.innerHTML = '';
            if(!reactionsData) return;
            Object.entries(reactionsData).forEach(([encodedEmoji, users]) => {
                const emoji = decodeURIComponent(encodedEmoji);
                const userList = Object.keys(users || {});
                if(userList.length === 0) return;
                const isMine = userList.includes(user.replace(/[.#$[\]]/g,'_'));
                const badge = document.createElement('span');
                badge.className = 'react-badge' + (isMine ? ' mine' : '');
                badge.innerHTML = `${emoji} <span class="react-count">${userList.length}</span>`;
                badge.onclick = (e) => { e.stopPropagation(); react(key, emoji); };
                container.appendChild(badge);
            });
        }

        db.ref('chats').on('child_added', (snap) => {
            let data = snap.val();
            let key = snap.key;
            if(hiddenMsgs.includes(key)) return;

            let isSent = data.name === user;
            let div = document.createElement('div');
            div.id = 'msg-' + key;
            div.className = "msg " + (isSent ? "sent" : "received");

            let epBtns = EMOJIS.map(e => `<button class="ep-btn" onclick="event.stopPropagation();react('${key}','${e}')">${e}</button>`).join('');

            div.innerHTML = `
                <div class="avatar" style="background:${getColor(data.name)}">${data.name.charAt(0).toUpperCase()}</div>
                <div style="display:flex;flex-direction:column;gap:3px;position:relative;">
                    <div id="ep-${key}" class="emoji-picker">${epBtns}</div>
                    <div id="menu-${key}" class="del-menu">
                        <button onclick="event.stopPropagation();deleteForMe('${key}')">❌ میرے لیے ڈیلیٹ</button>
                        ${isSent ? `<button style="color:#f87171" onclick="event.stopPropagation();deleteForEveryone('${key}')">🗑️ سب کے لیے ڈیلیٹ</button>` : ''}
                    </div>
                    <div class="bubble"
                        onmousedown="onMsgPress('${key}')" onmouseup="onMsgRelease()"
                        ontouchstart="onMsgPress('${key}')" ontouchend="onMsgRelease()"
                        onclick="onMsgTap('${key}')">
                        <div class="msg-body">
                            <span class="name" style="color:${getColor(data.name)}">${data.name}</span>
                            <span class="msg-text">${data.text}</span>
                            <span class="meta">${data.time}</span>
                        </div>
                    </div>
                    <div id="reacts-${key}" class="reactions"></div>
                </div>
            `;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            db.ref(`reactions/${key}`).on('value', (rSnap) => renderReactions(key, rSnap.val()));
        });

        db.ref('chats').on('child_removed', (snap) => {
            const el = document.getElementById('msg-' + snap.key);
            if(el) el.remove();
        });

        window.onclick = (e) => { if (!e.target.closest('.msg')) closeAll(); };
        document.getElementById('inp').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
