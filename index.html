<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Chat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b141a; display: flex; flex-direction: column; height: 100vh; color: #e9edef; }

        /* Pro Header */
        .header { background: #202c33; padding: 12px 16px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; }
        .header-title { font-size: 18px; font-weight: bold; flex: 1; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-image: linear-gradient(rgba(11,20,26,0.9), rgba(11,20,26,0.9)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }

        .message { margin-bottom: 10px; padding: 8px; border-radius: 8px; max-width: 75%; position: relative; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.5); }
        .message.sent { align-self: flex-end; background: #005c4b; }
        .message.received { align-self: flex-start; background: #202c33; }
        
        /* امیج ڈیزائن */
        .chat-img { width: 100%; border-radius: 5px; margin-top: 5px; cursor: pointer; display: block; }
        
        .user-name { font-size: 11px; font-weight: bold; color: #53bdeb; display: block; margin-bottom: 3px; }
        .msg-meta { font-size: 9px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 5px; display: block; }

        /* Pro Footer */
        .footer { display: flex; padding: 8px; background: #0b141a; gap: 8px; align-items: center; }
        .input-group { flex: 1; background: #2a3942; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; }
        
        #messageInput { flex: 1; background: transparent; border: none; padding: 12px 5px; color: white; outline: none; font-size: 16px; }
        
        .upload-btn { color: #8696a0; font-size: 22px; cursor: pointer; margin-right: 10px; }
        
        #sendBtn { background: #00a884; color: white; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="header"><div class="header-title">Family Group</div></div>

    <div id="messages"></div>

    <div class="footer">
        <div class="input-group">
            <label for="fileInput" class="upload-btn">📎</label>
            <input type="file" id="fileInput" accept="image/*">
            <input type="text" id="messageInput" placeholder="پیغام لکھیں...">
        </div>
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc",
            storageBucket: "public-chat-app-e75fc.appspot.com",
            messagingSenderId: "113978559349",
            appId: "1:113978559349:web:6ba4e5ab8ae3b2af80213c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let userName = localStorage.getItem('chat_user') || prompt("آپ کا نام:") || "Guest";
        localStorage.setItem('chat_user', userName);

        // پیغام بھیجنا (ٹیکسٹ)
        function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            if (text !== "") {
                pushMsg({ name: userName, text: text, type: 'text' });
                document.getElementById('messageInput').value = "";
            }
        }

        // امیج اپ لوڈ کرنا
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const ref = storage.ref('chat_images/' + Date.now() + "_" + file.name);
            alert("تصویر اپ لوڈ ہو رہی ہے...");
            
            ref.put(file).then(snapshot => {
                snapshot.ref.getDownloadURL().then(url => {
                    pushMsg({ name: userName, imageUrl: url, type: 'image' });
                });
            });
        };

        function pushMsg(data) {
            const now = new Date();
            data.time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            data.timestamp = Date.now();
            db.ref('chats').push(data);
        }

        db.ref('chats').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', data.name === userName ? 'sent' : 'received');
            
            let content = data.type === 'image' 
                ? `<img src="${data.imageUrl}" class="chat-img">` 
                : `<div>${data.text}</div>`;

            msgDiv.innerHTML = `
                ${data.name !== userName ? `<span class="user-name">${data.name}</span>` : ''}
                ${content}
                <span class="msg-meta">${data.time}</span>
            `;
            document.getElementById('messages').appendChild(msgDiv);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
