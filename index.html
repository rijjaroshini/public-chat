<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: #e5ddd5; overflow: hidden; }
        
        /* Header & Search Bar */
        .header { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 55px; z-index: 100; }
        #searchBar { display: none; background: white; padding: 8px; border-bottom: 1px solid #ccc; animation: slideDown 0.3s; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        #searchInput { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }

        /* Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; user-select: none; }
        .my-msg { align-self: flex-end; background: #dcf8c6; border: 1px solid #c7e5b0; }
        .other-msg { align-self: flex-start; background: white; border: 1px solid #ddd; }
        .u-name { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 2px; }
        .del-text { font-style: italic; color: #888; font-size: 13px; }

        /* WhatsApp Style Menu */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 12px; width: 250px; z-index: 1000; overflow: hidden; }
        .menu-item { padding: 15px; text-align: center; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; }
        .menu-item:last-child { border: none; }

        /* Footer Fix for Mobile Buttons */
        .footer { background: #f0f0f0; padding: 10px 10px 45px 10px; border-top: 2px solid #075e54; }
        .input-box { display: flex; align-items: center; gap: 8px; background: white; border-radius: 25px; padding: 5px 15px; border: 1px solid #ccc; }
        #msgInput { flex: 1; border: none; outline: none; padding: 10px 0; font-size: 16px; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; }
    </style>
</head>
<body>

<div class="header">
    <b id="userLabel">Chat</b>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span onclick="toggleSearch()" style="cursor:pointer; font-size: 20px;">🔍</span>
        <span onclick="location.reload()" style="font-size: 12px; border: 1px solid; padding: 2px 5px; border-radius: 4px;">Refresh</span>
    </div>
</div>

<div id="searchBar">
    <input type="text" id="searchInput" placeholder="Search in chat..." oninput="filterChat()">
</div>

<div id="messages"></div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="menu" id="actionMenu">
    <div class="menu-item" onclick="delForMe()">Delete for Me</div>
    <div id="everyoneBtn" class="menu-item" style="color: red; display: none;" onclick="delForEveryone()">Delete for Everyone</div>
    <div class="menu-item" style="background: #f9f9f9;" onclick="closeMenu()">Cancel</div>
</div>

<div class="footer">
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    // --- Firebase Config Yahan Paste Karein ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem("chat_user") || prompt("Naam Likhein:") || "Guest";
    localStorage.setItem("chat_user", myName);
    document.getElementById('userLabel').innerText = myName;

    let selectedId = null;
    let selectedSender = null;
    let allMessages = [];
    let localDeleted = JSON.parse(localStorage.getItem("del_me") || "[]");

    function toggleSearch() {
        const s = document.getElementById('searchBar');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        if(s.style.display === 'block') document.getElementById('searchInput').focus();
    }

    function send() {
        const i = document.getElementById('msgInput');
        if(i.value.trim() !== "") {
            db.ref('chats').push({ name: myName, text: i.value, isDeleted: false, time: Date.now() });
            i.value = "";
        }
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });

    function openMenu(id, sender, isDeleted) {
        if(isDeleted) return;
        selectedId = id;
        selectedSender = sender;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('actionMenu').style.display = 'block';
        document.getElementById('everyoneBtn').style.display = (sender === myName) ? 'block' : 'none';
    }

    function closeMenu() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('actionMenu').style.display = 'none';
    }

    function delForMe() {
        localDeleted.push(selectedId);
        localStorage.setItem("del_me", JSON.stringify(localDeleted));
        closeMenu();
        render();
    }

    function delForEveryone() {
        db.ref('chats/' + selectedId).update({ text: "This message was deleted", isDeleted: true });
        closeMenu();
    }

    function filterChat() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMessages.filter(m => m.val.text.toLowerCase().includes(q));
        render(filtered);
    }

    function render(customList = null) {
        const cont = document.getElementById('messages');
        cont.innerHTML = "";
        const list = customList || allMessages;

        list.forEach(item => {
            const id = item.key;
            if (localDeleted.includes(id)) return;

            const data = item.val;
            const div = document.createElement('div');
            div.className = data.name === myName ? 'msg my-msg' : 'msg other-msg';

            // Long Press Logic
            let pressTimer;
            div.onmousedown = div.ontouchstart = () => { pressTimer = setTimeout(() => openMenu(id, data.name, data.isDeleted), 600); };
            div.onmouseup = div.ontouchend = () => { clearTimeout(pressTimer); };

            const n = `<span class="u-name">${data.name || "Guest"}</span>`;
            const t = data.isDeleted ? `<span class="del-text">🚫 ${data.text}</span>` : data.text;
            div.innerHTML = n + t;
            cont.appendChild(div);
        });
        cont.scrollTop = cont.scrollHeight;
    }

    db.ref('chats').on('value', (snap) => {
        allMessages = [];
        snap.forEach(c => { allMessages.push({ key: c.key, val: c.val() }); });
        render();
    });
</script>
</body>
</html>
