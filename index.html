<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Advanced Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: #e5ddd5; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        
        .header { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 55px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Message Bubbles */
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; cursor: pointer; transition: background 0.2s; }
        .msg:active { background: #f0f0f0; }
        .my-msg { align-self: flex-end; background: #dcf8c6; border: 1px solid #c7e5b0; }
        .other-msg { align-self: flex-start; background: white; border: 1px solid #ddd; }
        
        .u-name { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 2px; }
        .deleted-text { font-style: italic; color: #999; font-size: 13px; }

        /* Typing Area with Bottom Border */
        .footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 2px solid #075e54; margin-bottom: 10px; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; border: 1px solid #ccc; }
        #msgInput { width: 100%; border: none; outline: none; padding: 10px 0; font-size: 16px; }
        
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header">
    <b id="userLabel">Chat</b>
    <span onclick="location.reload()" style="cursor:pointer; font-size: 12px; border:1px solid; padding:2px 5px; border-radius:4px;">Refresh</span>
</div>

<div id="messages"></div>

<div class="footer">
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
    </div>
    <button class="send-btn" onclick="send()">➤</button>
</div>

<script>
    // --- Apni Firebase Config Yahan Paste Karein ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem("chat_user") || prompt("Naam Likhein:");
    if(!myName) myName = "Guest";
    localStorage.setItem("chat_user", myName);
    document.getElementById('userLabel').innerText = myName;

    // Local delete list (Delete for me)
    let myDeletedMsgs = JSON.parse(localStorage.getItem("deleted_locally") || "[]");

    function send() {
        const input = document.getElementById('msgInput');
        if(input.value.trim() !== "") {
            db.ref('chats').push({
                name: myName,
                text: input.value,
                isDeleted: false,
                time: Date.now()
            });
            input.value = "";
        }
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });

    // Message par click karne se delete menu aayega
    function openDeleteMenu(msgId, sender) {
        if (sender === myName) {
            const choice = prompt("Choose Option:\n1. Delete for Me\n2. Delete for Everyone\n(Type 1 or 2)");
            if (choice === "1") {
                myDeletedMsgs.push(msgId);
                localStorage.setItem("deleted_locally", JSON.stringify(myDeletedMsgs));
                location.reload(); 
            } else if (choice === "2") {
                db.ref('chats/' + msgId).update({ text: "This message was deleted", isDeleted: true });
            }
        } else {
            if (confirm("Delete for me?")) {
                myDeletedMsgs.push(msgId);
                localStorage.setItem("deleted_locally", JSON.stringify(myDeletedMsgs));
                location.reload();
            }
        }
    }

    db.ref('chats').on('value', (snap) => {
        const cont = document.getElementById('messages');
        cont.innerHTML = "";
        snap.forEach(child => {
            const id = child.key;
            if (myDeletedMsgs.includes(id)) return; // Skip if deleted for me

            const data = child.val();
            const div = document.createElement('div');
            div.className = data.name === myName ? 'msg my-msg' : 'msg other-msg';
            div.onclick = () => openDeleteMenu(id, data.name);

            const n = `<span class="u-name">${data.name}</span>`;
            const t = data.isDeleted ? `<span class="deleted-text">🚫 ${data.text}</span>` : data.text;
            
            div.innerHTML = n + t;
            cont.appendChild(div);
        });
        cont.scrollTop = cont.scrollHeight;
    });
</script>
</body>
</html>
