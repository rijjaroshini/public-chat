<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Purana Black Header */
        .header { background-color: #121b22; color: white; padding: 15px; text-align: left; font-size: 20px; font-weight: bold; }
        
        /* Message Area */
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 70%; word-wrap: break-word; position: relative; }
        .message.sent { align-self: flex-end; background-color: #dcf8c6; }
        .message.received { align-self: flex-start; background-color: #ffffff; }
        
        .user-name { font-size: 12px; font-weight: bold; color: #075e54; margin-bottom: 2px; display: block; }
        
        /* Purana Footer */
        .footer { display: flex; padding: 10px; background-color: #ffffff; border-top: 1px solid #ccc; }
        #messageInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #sendBtn { background-color: #075e54; color: white; border: none; padding: 10px 15px; margin-left: 5px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">Public Chat</div>

    <div id="messages"></div>

    <div class="footer">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">➤</button>
    </div>

    <script>
        // Aapki Screenshot se li gayi sahi Config
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc",
            storageBucket: "public-chat-app-e75fc.appspot.com",
            messagingSenderId: "113978559349",
            appId: "1:113978559349:web:6ba4e5ab8ae3b2af80213c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // User Name setup
        let userName = localStorage.getItem('chat_user') || prompt("Enter your name:") || "Guest";
        localStorage.setItem('chat_user', userName);

        // Send Message Function
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                database.ref('chats').push({
                    name: userName,
                    text: text,
                    timestamp: Date.now()
                });
                messageInput.value = "";
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Listen for Messages
        database.ref('chats').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(data.name === userName ? 'sent' : 'received');
            
            msgDiv.innerHTML = `<span class="user-name">${data.name}</span>${data.text}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
