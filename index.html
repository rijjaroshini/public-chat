<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Chat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #e5ddd5;
            --header-bg: #075e54;
            --msg-sent: #dcf8c6;
            --msg-received: #ffffff;
            --text-color: #000000;
            --footer-bg: #f0f0f0;
            --input-bg: #ffffff;
        }

        .dark-theme {
            --bg-color: #0b141a;
            --header-bg: #202c33;
            --msg-sent: #005c4b;
            --msg-received: #202c33;
            --text-color: #ffffff;
            --footer-bg: #0b141a;
            --input-bg: #2a3942;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        
        /* ہیڈر ڈیزائن */
        .header { background: var(--header-bg); color: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .btn-header { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }

        #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; }
        
        .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 10px; max-width: 80%; position: relative; display: flex; align-items: flex-start; gap: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; }
        .sent { align-self: flex-end; background: var(--msg-sent); flex-direction: row-reverse; }
        .received { align-self: flex-start; background: var(--msg-received); }
        
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0; }
        .msg-body { display: flex; flex-direction: column; }
        .name { font-size: 11px; font-weight: bold; color: #128c7e; margin-bottom: 2px; }
        .meta { font-size: 9px; color: #888; margin-top: 4px; text-align: right; }

        .footer { display: flex; padding: 10px; background: var(--footer-bg); border-top: 1px solid rgba(0,0,0,0.1); gap: 8px; }
        input { flex: 1; padding: 12px 18px; border: 1px solid #ccc; border-radius: 25px; outline: none; background: var(--input-bg); color: var(--text-color); }
        
        button#send { background: #128c7e; color: white; border: none; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

        /* ڈیلیٹ مینیو */
        .del-menu { display: none; background: white; border-radius: 8px; position: absolute; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 150px; color: black; }
        .del-menu button { display: block; width: 100%; padding: 12px; border: none; background: none; text-align: left; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div class="header-left">
            <button class="btn-header" onclick="toggleTheme()">🌓 Theme</button>
            <span>Family Chat</span>
        </div>
        <button class="btn-header" style="background: #cc0000;" onclick="clearAll()">🗑️ Clear All</button>
    </div>

    <div id="messages"></div>

    <div class="footer">
        <input type="text" id="inp" placeholder="پیغام لکھیں...">
        <button id="send" onclick="send()">➤</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = localStorage.getItem('user') || prompt("نام لکھیں:") || "Guest";
        localStorage.setItem('user', user);

        // تھیم بدلنا
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            let isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // محفوظ تھیم لوڈ کرنا
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');

        // سب مٹانا
        function clearAll() {
            if(confirm("کیا آپ تمام پیغامات مٹانا چاہتے ہیں؟")) {
                db.ref('chats').remove();
            }
        }

        function getColor(name) {
            const colors = ['#f44336', '#E91E63', '#9C27B0', '#673AB7', '#3F51B5', '#2196F3', '#009688', '#4CAF50'];
            return colors[name.charCodeAt(0) % colors.length];
        }

        function send() {
            let txt = document.getElementById('inp').value.trim();
            if(txt) {
                let now = new Date();
                let timeStr = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
                db.ref('chats').push({ name: user, text: txt, time: timeStr, timestamp: Date.now() });
                document.getElementById('inp').value = "";
            }
        }

        function showMenu(key) {
            document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
            document.getElementById('menu-' + key).style.display = 'block';
        }

        db.ref('chats').on('child_added', (snap) => {
            let data = snap.val();
            let key = snap.key;
            let div = document.createElement('div');
            div.id = 'msg-' + key;
            div.className = "msg " + (data.name === user ? "sent" : "received");
            div.onclick = () => showMenu(key);
            
            div.innerHTML = `
                <div class="avatar" style="background: ${getColor(data.name)}">${data.name.charAt(0)}</div>
                <div class="msg-body">
                    <span class="name">${data.name}</span>
                    <span>${data.text}</span>
                    <span class="meta">${data.time}</span>
                </div>
                <div id="menu-${key}" class="del-menu">
                    <button onclick="document.getElementById('msg-${key}').remove()">❌ Delete for me</button>
                    ${data.name === user ? `<button onclick="firebase.database().ref('chats/${key}').remove()">🗑️ Delete for everyone</button>` : ''}
                </div>
            `;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        db.ref('chats').on('child_removed', (snap) => {
            let el = document.getElementById('msg-' + snap.key);
            if(el) el.remove();
        });

        window.onclick = (e) => { if (!e.target.closest('.msg')) document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none'); };
        document.getElementById('inp').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
