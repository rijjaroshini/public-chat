<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: #e5ddd5; overflow: hidden; }
        
        /* Fixed Header */
        .header { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; min-height: 55px; }
        .header b { font-size: 16px; }

        /* Search Bar Area */
        #searchContainer { background: #fff; padding: 5px 10px; display: none; border-bottom: 1px solid #ccc; }
        #searchInput { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd; outline: none; }

        /* Scrollable Chat Area */
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; background: #e5ddd5; }
        
        /* Bubbles Design */
        .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 8px; max-width: 85%; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #dcf8c6; border: 1px solid #c7e5b0; }
        .other-msg { align-self: flex-start; background: white; border: 1px solid #ddd; }
        
        .user-name { font-size: 10px; font-weight: bold; color: #075e54; display: block; margin-bottom: 2px; }

        /* Bottom Input Bar - Fixed at bottom */
        .input-area { background: #f0f0f0; padding: 8px; display: flex; align-items: center; border-top: 1px solid #ddd; }
        #msgInput { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 14px; }
        #sendBtn { background: #075e54; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; margin-left: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .icon-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <b id="displayingName">Chat</b>
    <div>
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
        <button onclick="clearLocalChat()" style="background:none; border:1px solid white; color:white; border-radius:4px; font-size:10px; margin-left:5px; padding:2px 5px;">Clear</button>
    </div>
</div>

<div id="searchContainer">
    <input type="text" id="searchInput" placeholder="Search message..." oninput="filterMessages()">
</div>

<div id="messages"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">➤</button>
</div>

<script>
    // Paste YOUR Firebase Config here
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userName = localStorage.getItem("chat_user_name") || prompt("Naam Likhein:") || "Guest";
    localStorage.setItem("chat_user_name", userName);
    document.getElementById('displayingName').innerText = userName;

    let allMessages = [];

    function toggleSearch() {
        const s = document.getElementById('searchContainer');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }

    function filterMessages() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(allMessages.filter(m => m.text.toLowerCase().includes(q)));
    }

    function send() {
        const i = document.getElementById('msgInput');
        if(i.value.trim() !== "") {
            db.ref('chats').push({ name: userName, text: i.value, timestamp: Date.now() });
            i.value = "";
        }
    }

    function clearLocalChat() { document.getElementById('messages').innerHTML = ""; }

    function render(msgs) {
        const c = document.getElementById('messages');
        c.innerHTML = "";
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = m.name === userName ? 'msg my-msg' : 'msg other-msg';
            div.innerHTML = `<span class="user-name">${m.name}</span>${m.text}`;
            c.appendChild(div);
        });
        c.scrollTop = c.scrollHeight;
    }

    db.ref('chats').on('value', (snap) => {
        allMessages = [];
        snap.forEach(child => { allMessages.push(child.val()); });
        filterMessages();
    });
</script>
</body>
</html>
