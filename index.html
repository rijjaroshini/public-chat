<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Style Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: #e5ddd5; overflow: hidden; }
        
        .header { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 55px; z-index: 100; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Message Bubbles */
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; user-select: none; -webkit-tap-highlight-color: transparent; }
        .my-msg { align-self: flex-end; background: #dcf8c6; border: 1px solid #c7e5b0; }
        .other-msg { align-self: flex-start; background: white; border: 1px solid #ddd; }
        
        .u-name { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 2px; }
        .del-indicator { font-style: italic; color: #888; font-size: 13px; display: flex; align-items: center; gap: 4px; }

        /* Long Press Menu (WhatsApp Style) */
        .msg-action-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; overflow: hidden; width: 200px; }
        .action-item { padding: 15px; border-bottom: 1px solid #eee; text-align: center; cursor: pointer; color: #333; font-weight: 500; }
        .action-item:last-child { border: none; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }

        /* Fixed Typing Bar - Extra Padding for Mobile Buttons */
        .footer { background: #f0f0f0; padding: 10px 10px 40px 10px; /* 40px padding for mobile buttons */ border-top: 2px solid #075e54; position: relative; }
        .input-box { display: flex; align-items: center; gap: 8px; background: white; border-radius: 25px; padding: 5px 15px; border: 1px solid #ccc; }
        #msgInput { flex: 1; border: none; outline: none; padding: 10px 0; font-size: 16px; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<div class="header">
    <b id="userLabel">Public Chat</b>
    <span onclick="location.reload()" style="font-size: 12px; border: 1px solid white; padding: 2px 5px; border-radius: 4px;">Refresh</span>
</div>

<div id="messages"></div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="msg-action-menu" id="actionMenu">
    <div class="action-item" onclick="deleteLocal()">Delete for Me</div>
    <div id="everyoneOpt" class="action-item" style="color: red;" onclick="deleteEveryone()">Delete for Everyone</div>
    <div class="action-item" style="background: #eee;" onclick="closeMenu()">Cancel</div>
</div>

<div class="footer">
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    // --- Apni Firebase Config Yahan Dalein ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem("chat_user") || prompt("Apna Naam Likhein:") || "Guest";
    localStorage.setItem("chat_user", myName);
    document.getElementById('userLabel').innerText = myName;

    let selectedMsgId = null;
    let selectedSender = null;
    let myDeletedMsgs = JSON.parse(localStorage.getItem("deleted_locally") || "[]");

    function send() {
        const input = document.getElementById('msgInput');
        if(input.value.trim() !== "") {
            db.ref('chats').push({ name: myName, text: input.value, isDeleted: false, time: Date.now() });
            input.value = "";
        }
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });

    // Menu Functions
    function showMenu(id, sender, isDeleted) {
        if(isDeleted) return; 
        selectedMsgId = id;
        selectedSender = sender;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('actionMenu').style.display = 'block';
        document.getElementById('everyoneOpt').style.display = (sender === myName) ? 'block' : 'none';
    }

    function closeMenu() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('actionMenu').style.display = 'none';
    }

    function deleteLocal() {
        myDeletedMsgs.push(selectedMsgId);
        localStorage.setItem("deleted_locally", JSON.stringify(myDeletedMsgs));
        closeMenu();
        render(); 
    }

    function deleteEveryone() {
        db.ref('chats/' + selectedMsgId).update({ text: "This message was deleted", isDeleted: true });
        closeMenu();
    }

    function render() {
        db.ref('chats').once('value', (snap) => {
            const cont = document.getElementById('messages');
            cont.innerHTML = "";
            snap.forEach(child => {
                const id = child.key;
                if (myDeletedMsgs.includes(id)) return;
                const data = child.val();
                const div = document.createElement('div');
                div.className = data.name === myName ? 'msg my-msg' : 'msg other-msg';
                
                // Long press ke liye logic
                let timer;
                div.onmousedown = div.ontouchstart = () => { timer = setTimeout(() => showMenu(id, data.name, data.isDeleted), 600); };
                div.onmouseup = div.ontouchend = () => { clearTimeout(timer); };

                const nameTag = `<span class="u-name">${data.name}</span>`;
                const content = data.isDeleted ? `<span class="del-indicator">🚫 This message was deleted</span>` : data.text;
                div.innerHTML = nameTag + content;
                cont.appendChild(div);
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    db.ref('chats').on('value', render);
</script>
</body>
</html>
