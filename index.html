<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fixed Chat App</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: #e5ddd5; 
            overflow: hidden; 
        }

        /* Header Fix */
        .header { 
            background: #075e54; 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 55px; 
            flex-shrink: 0;
            z-index: 1000;
        }

        .header b { font-size: 18px; }

        /* Search Section */
        #searchContainer { 
            display: none; 
            background: #f6f6f6; 
            padding: 8px; 
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }
        
        #searchInput { 
            width: 100%; 
            padding: 10px; 
            border-radius: 20px; 
            border: 1px solid #ccc; 
            outline: none; 
        }

        /* Messages Area - Scrolling Fix */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }

        .msg { 
            padding: 8px 12px; 
            border-radius: 10px; 
            max-width: 80%; 
            word-wrap: break-word; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            position: relative;
        }
        
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .other-msg { align-self: flex-start; background: white; }
        .u-name { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 2px; }

        /* Footer - Mobile Buttons Fix */
        .footer { 
            background: #f0f0f0; 
            padding: 10px 10px 35px 10px; /* Safe area for mobile buttons */
            border-top: 1px solid #ccc;
            flex-shrink: 0;
        }

        .input-box { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: white; 
            border-radius: 25px; 
            padding: 2px 15px; 
            border: 1px solid #ddd;
        }

        #msgInput { 
            flex: 1; 
            border: none; 
            padding: 12px 0; 
            outline: none; 
            font-size: 16px; 
        }

        .send-btn { 
            background: #075e54; 
            color: white; 
            border: none; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* Overlay Menu for Deleting */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 12px; width: 250px; z-index: 2001; }
        .menu-item { padding: 15px; text-align: center; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <b id="userDisplay">Chat</b>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span onclick="toggleSearch()" style="cursor:pointer; font-size: 20px;">🔍</span>
        <button onclick="requestAlerts()" style="font-size: 10px; background:none; border:1px solid white; color:white; border-radius:4px; padding:2px 5px;">Alerts</button>
    </div>
</div>

<div id="searchContainer">
    <input type="text" id="searchInput" placeholder="Search message..." oninput="doSearch()">
</div>

<div id="messages"></div>

<div class="footer">
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="menu" id="menu">
    <div class="menu-item" onclick="deleteMe()">Delete for Me</div>
    <div id="delEveryone" class="menu-item" style="color:red; display:none;" onclick="deleteEveryone()">Delete for Everyone</div>
    <div class="menu-item" style="background:#f5f5f5" onclick="closeMenu()">Cancel</div>
</div>

<script>
    // --- IMPORTANT: Paste YOUR Firebase Config Here ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myUser = localStorage.getItem("chat_user") || prompt("Apna Naam Likhein:") || "Guest";
    localStorage.setItem("chat_user", myUser);
    document.getElementById('userDisplay').innerText = myUser;

    let allMessages = [];
    let localDeleted = JSON.parse(localStorage.getItem("local_del") || "[]");
    let targetMsgId = null;

    function toggleSearch() {
        const s = document.getElementById('searchContainer');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(input.value.trim() !== "") {
            database.ref('chats').push({
                name: myUser,
                text: input.value,
                isDeleted: false,
                timestamp: Date.now()
            });
            input.value = "";
        }
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

    function openMenu(id, sender, isDeleted) {
        if(isDeleted) return;
        targetMsgId = id;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('menu').style.display = 'block';
        document.getElementById('delEveryone').style.display = (sender === myUser) ? 'block' : 'none';
    }

    function closeMenu() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('menu').style.display = 'none';
    }

    function deleteMe() {
        localDeleted.push(targetMsgId);
        localStorage.setItem("local_del", JSON.stringify(localDeleted));
        closeMenu();
        render();
    }

    function deleteEveryone() {
        database.ref('chats/' + targetMsgId).update({ text: "This message was deleted", isDeleted: true });
        closeMenu();
    }

    function doSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        render(allMessages.filter(m => m.val.text.toLowerCase().includes(query)));
    }

    function requestAlerts() {
        Notification.requestPermission().then(p => { if(p==='granted') alert('Notifications Enabled!'); });
    }

    function render(list = null) {
        const cont = document.getElementById('messages');
        cont.innerHTML = "";
        const dataToShow = list || allMessages;

        dataToShow.forEach(item => {
            if (localDeleted.includes(item.key)) return;
            const data = item.val;
            const div = document.createElement('div');
            div.className = data.name === myUser ? 'msg my-msg' : 'msg other-msg';
            
            let timer;
            div.onmousedown = div.ontouchstart = () => timer = setTimeout(() => openMenu(item.key, data.name, data.isDeleted), 600);
            div.onmouseup = div.ontouchend = () => clearTimeout(timer);

            const name = `<span class="u-name">${data.name}</span>`;
            const content = data.isDeleted ? `<i style="color:#888; font-size:13px;">🚫 ${data.text}</i>` : data.text;
            div.innerHTML = name + content;
            cont.appendChild(div);
        });
        cont.scrollTop = cont.scrollHeight;
    }

    database.ref('chats').on('value', (snap) => {
        allMessages = [];
        snap.forEach(child => { allMessages.push({ key: child.key, val: child.val() }); });
        render();
    });
</script>
</body>
</html>
