<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat App Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: #e5ddd5; overflow: hidden; }

        /* No Header Design */
        .floating-tools { position: fixed; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 1000; }
        .f-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 20px; }

        #searchBox { display: none; padding: 12px; background: white; position: fixed; top: 0; width: 100%; z-index: 1001; border-bottom: 1px solid #ddd; }
        #searchInput { width: 100%; padding: 12px 15px; border-radius: 25px; border: 1px solid #ccc; outline: none; }

        /* Chat Display */
        #chatDisplay { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .bubble { padding: 8px 12px; border-radius: 12px; max-width: 80%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .u-name { font-size: 11px; font-weight: bold; color: #075e54; display: block; margin-bottom: 2px; }

        /* Footer Fix for Mobile */
        .input-footer { background: #f0f0f0; padding: 10px 10px 45px 10px; border-top: 1px solid #ddd; }
        .input-container { display: flex; align-items: center; gap: 10px; background: white; border-radius: 30px; padding: 5px 15px; border: 1px solid #ddd; }
        #msgField { flex: 1; border: none; padding: 12px 0; outline: none; font-size: 16px; }
        .send-btn { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .modal-body { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 12px; width: 260px; z-index: 2001; overflow: hidden; }
        .modal-item { padding: 16px; text-align: center; border-bottom: 1px solid #eee; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

<div class="floating-tools">
    <button class="f-btn" onclick="toggleSearch()">🔍</button>
</div>

<div id="searchBox">
    <input type="text" id="searchInput" placeholder="Search..." oninput="doSearch()">
    <button onclick="toggleSearch()" style="margin-top:8px; border:none; background:none; color:#075e54; font-weight:bold; width:100%;">Cancel</button>
</div>

<div id="chatDisplay"></div>

<div class="input-footer">
    <div class="input-container">
        <input type="text" id="msgField" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="pushMsg()">➤</button>
    </div>
</div>

<div class="modal-bg" id="bg" onclick="hideMenu()"></div>
<div class="modal-body" id="menu">
    <div class="modal-item" onclick="delMe()">Delete for Me</div>
    <div id="delAllBtn" class="modal-item" style="color:red; display:none;" onclick="delAll()">Delete for Everyone</div>
    <div class="modal-item" style="background:#f5f5f5" onclick="hideMenu()">Cancel</div>
</div>

<script>
    // --- آپ کی درست Firebase تفصیلات ---
    const firebaseConfig = {
        apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y", 
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "113978559349",
        appId: "1:113978559349:web:6ba4e5ab8ae3b2af80213c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem("chat_user") || prompt("Apna Naam Likhein:") || "Guest";
    localStorage.setItem("chat_user", myName);

    let msgsData = [];
    let hiddenIds = JSON.parse(localStorage.getItem("hidden_msgs") || "[]");
    let currentId = null;

    function toggleSearch() {
        const b = document.getElementById('searchBox');
        b.style.display = (b.style.display === 'block') ? 'none' : 'block';
    }

    function pushMsg() {
        const inp = document.getElementById('msgField');
        if(inp.value.trim() !== "") {
            db.ref('chats').push({
                name: myName,
                text: inp.value,
                isDeleted: false,
                time: Date.now()
            }).catch(e => alert("Error: " + e.message));
            inp.value = "";
        }
    }

    document.getElementById('msgField').addEventListener('keypress', (e) => { if(e.key==='Enter') pushMsg(); });

    function showMenu(id, sender, isDeleted) {
        if(isDeleted) return;
        currentId = id;
        document.getElementById('bg').style.display = 'block';
        document.getElementById('menu').style.display = 'block';
        document.getElementById('delAllBtn').style.display = (sender === myName) ? 'block' : 'none';
    }

    function hideMenu() {
        document.getElementById('bg').style.display = 'none';
        document.getElementById('menu').style.display = 'none';
    }

    function delMe() {
        hiddenIds.push(currentId);
        localStorage.setItem("hidden_msgs", JSON.stringify(hiddenIds));
        hideMenu();
        refreshUI();
    }

    function delAll() {
        db.ref('chats/' + currentId).update({ text: "This message was deleted", isDeleted: true });
        hideMenu();
    }

    function doSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        refreshUI(msgsData.filter(m => m.val.text.toLowerCase().includes(q)));
    }

    function refreshUI(list = null) {
        const cont = document.getElementById('chatDisplay');
        cont.innerHTML = "";
        const final = list || msgsData;
        final.forEach(item => {
            if (hiddenIds.includes(item.key)) return;
            const d = item.val;
            const div = document.createElement('div');
            div.className = d.name === myName ? 'bubble sent' : 'bubble received';
            
            let t;
            div.onmousedown = div.ontouchstart = () => t = setTimeout(() => showMenu(item.key, d.name, d.isDeleted), 600);
            div.onmouseup = div.ontouchend = () => clearTimeout(t);

            div.innerHTML = `<span class="u-name">${d.name}</span>${d.isDeleted ? '<i style="color:#888;">🚫 Deleted</i>' : d.text}`;
            cont.appendChild(div);
        });
        cont.scrollTop = cont.scrollHeight;
    }

    // Real-time Database Listener
    db.ref('chats').on('value', (s) => {
        msgsData = [];
        s.forEach(c => { msgsData.push({ key: c.key, val: c.val() }); });
        refreshUI();
    }, (error) => {
        console.error("Firebase Error: ", error);
    });
</script>
</body>
</html>
