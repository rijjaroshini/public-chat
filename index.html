<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Public Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { margin-left: 8px; padding: 10px 20px; background: #075e54; color: white; border: none; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>
<div id="chat-window"></div>
<div class="input-area">
    <input type="text" id="message-input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAB9V4_KEmO7f6QDYVFQFhyWnYSD56mtKM",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.firebasestorage.app",
        messagingSenderId: "113978559349",
        appId: "1:113978559349:web:6ba4e5ab8ae3b2af80213c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    firebase.auth().signInAnonymously();
    function sendMessage() {
        const input = document.getElementById('message-input');
        if (input.value.trim() !== "") {
            db.collection("public_messages").add({
                text: input.value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        }
    }
    db.collection("public_messages").orderBy("timestamp", "asc").onSnapshot((snapshot) => {
        const chatWindow = document.getElementById('chat-window');
        chatWindow.innerHTML = "";
        snapshot.forEach((doc) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = "msg";
            msgDiv.innerText = doc.data().text;
            chatWindow.appendChild(msgDiv);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });
</script>
</body>
</html>
