<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Family Chat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Noto+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: 'Sora', 'Noto Sans Arabic', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top); 
        }

        /* Date Divider Box */
        .date-divider {
            text-align: center;
            margin: 20px 0 10px;
            position: relative;
        }
        .date-divider span {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--text-dim);
            backdrop-filter: blur(5px);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }
        #messages::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 82%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .sent { align-self: flex-end; align-items: flex-end; }
        .received { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            border: 1px solid var(--glass-border);
        }

        .sent .bubble { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            border-bottom-right-radius: 4px; 
            border: none;
        }
        
        .received .bubble { 
            background: var(--glass-bg); 
            border-bottom-left-radius: 4px; 
        }

        .msg-info { 
            font-size: 0.6rem; 
            color: var(--text-dim); 
            margin-top: 4px; 
            padding: 0 5px; 
        }

        .input-container { 
            padding: 10px 15px 5px 15px; 
            background: rgba(15, 23, 42, 0.5);
        }
        
        .input-wrapper {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            display: flex;
            padding: 6px 6px 6px 18px;
        }

        .input-wrapper input { 
            flex: 1; 
            background: none; 
            border: none; 
            color: white; 
            font-size: 0.95rem;
        }

        .send-btn { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border: none; 
            background: white; 
            color: var(--bg-dark);
            cursor: pointer; 
            font-size: 1.2rem; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bottom-safe-bar {
            height: env(safe-area-inset-bottom, 20px);
            background: #0f172a;
            width: 100%;
        }

        .del-menu {
            display: none; position: absolute; bottom: 110%; right: 0;
            background: #1e293b; border: 1px solid var(--glass-border);
            border-radius: 12px; z-index: 200; width: 160px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .del-menu button {
            width: 100%; padding: 12px; border: none; background: none;
            color: white; text-align: left; font-size: 0.85rem; cursor: pointer;
            border-bottom: 1px solid var(--glass-border);
        }

        .deleted-msg { font-style: italic; opacity: 0.5; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="messages"></div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="inp" placeholder="پیغام لکھیں..." autocomplete="off">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <div class="bottom-safe-bar"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('user');
        if (!currentUser || currentUser === "null" || currentUser === "undefined") {
            currentUser = prompt("اپنا نام لکھیں:") || "User_" + Math.floor(Math.random() * 1000);
            localStorage.setItem('user', currentUser);
        }

        function send() {
            let input = document.getElementById('inp');
            let text = input.value.trim();
            if(text) {
                let now = new Date();
                let timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let dateStr = now.toLocaleDateString('en-GB'); // DD/MM/YYYY

                db.ref('chats').push({
                    name: currentUser,
                    text: text,
                    time: timeStr,
                    date: dateStr,
                    timestamp: Date.now(), // ترتیب کے لیے
                    isDeletedEveryone: false
                });
                input.value = "";
            }
        }

        function deleteForEveryone(key) {
            db.ref('chats/' + key).update({ text: "This message was deleted", isDeletedEveryone: true });
        }

        function deleteForMe(key) {
            let userKey = currentUser.replace(/[.#$[\]]/g,'_');
            db.ref('chats/' + key + '/deletedBy/' + userKey).set(true);
        }

        function toggleMenu(key) {
            let menu = document.getElementById('menu-' + key);
            let isVisible = menu.style.display === 'block';
            document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
            menu.style.display = isVisible ? 'none' : 'block';
        }

        let lastDisplayedDate = "";

        db.ref('chats').orderByChild('timestamp').on('value', (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            lastDisplayedDate = ""; 
            
            snap.forEach((child) => {
                let data = child.val();
                let key = child.key;
                let dName = data.name || "Guest";
                let dText = data.text || "";
                let dTime = data.time || "00:00";
                let dDate = data.date || "";
                let isDeleted = data.isDeletedEveryone || false;
                
                let userKey = currentUser.replace(/[.#$[\]]/g,'_');
                if (data.deletedBy && data.deletedBy[userKey]) return;

                // تاریخ چیک کریں اور ڈیوائیڈر لگائیں
                if (dDate !== lastDisplayedDate && dDate !== "") {
                    let dateDiv = document.createElement('div');
                    dateDiv.className = "date-divider";
                    dateDiv.innerHTML = `<span>${dDate}</span>`;
                    box.appendChild(dateDiv);
                    lastDisplayedDate = dDate;
                }

                let isSent = dName === currentUser;
                let div = document.createElement('div');
                div.className = "msg " + (isSent ? "sent" : "received");

                let displayContent = isDeleted 
                    ? `<span class="deleted-msg">🚫 This message was deleted</span>` 
                    : dText;

                div.innerHTML = `
                    <div style="position:relative">
                        <div id="menu-${key}" class="del-menu">
                            <button onclick="deleteForMe('${key}')">Delete for me</button>
                            ${isSent && !isDeleted ? `<button style="color:#f87171" onclick="deleteForEveryone('${key}')">Delete for everyone</button>` : ''}
                        </div>
                        <div class="bubble" onclick="toggleMenu('${key}')">
                            ${!isSent ? `<div style="font-size:0.65rem; font-weight:bold; color:var(--secondary); margin-bottom:4px;">${dName}</div>` : ''}
                            ${displayContent}
                        </div>
                    </div>
                    <div class="msg-info">${dTime}</div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        document.getElementById('inp').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
        window.onclick = (e) => { if (!e.target.closest('.bubble')) document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none'); };
    </script>
</body>
</html>
