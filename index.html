<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Chat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.12);
            --accent: #a78bfa;
            --accent2: #38bdf8;
            --sent-bg: linear-gradient(135deg, #7c3aed, #4f46e5);
            --recv-bg: rgba(255,255,255,0.08);
            --text: #f1f5f9;
            --subtext: #94a3b8;
            --footer-bg: rgba(15,12,41,0.95);
            --header-bg: rgba(15,12,41,0.97);
            --input-bg: rgba(255,255,255,0.07);
        }

        .light-theme {
            --bg: linear-gradient(135deg, #e0f2fe, #f0e6ff, #fce4ec);
            --glass: rgba(255,255,255,0.55);
            --glass-border: rgba(100,80,200,0.18);
            --accent: #7c3aed;
            --accent2: #0ea5e9;
            --sent-bg: linear-gradient(135deg, #7c3aed, #a78bfa);
            --recv-bg: rgba(255,255,255,0.75);
            --text: #1e1b4b;
            --subtext: #6b7280;
            --footer-bg: rgba(230,220,255,0.97);
            --header-bg: rgba(230,220,255,0.97);
            --input-bg: rgba(255,255,255,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
            padding-top: env(safe-area-inset-top);
        }

        /* ===== MESSAGES AREA (TOP) ===== */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        /* ===== MESSAGE BUBBLES ===== */
        .msg {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 82%;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .sent { align-self: flex-end; flex-direction: row-reverse; }
        .received { align-self: flex-start; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; color: white;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px var(--glass-border);
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: transform 0.15s;
        }
        .bubble:hover { transform: scale(1.02); }

        .sent .bubble {
            background: var(--sent-bg);
            border-radius: 18px 18px 4px 18px;
            color: white;
        }

        .received .bubble {
            background: var(--recv-bg);
            border-radius: 18px 18px 18px 4px;
            color: var(--text);
        }

        .msg-body { display: flex; flex-direction: column; gap: 3px; }

        .name {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        .msg-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .meta {
            font-size: 9px;
            opacity: 0.55;
            text-align: right;
            margin-top: 2px;
        }

        /* ===== DELETE MENU ===== */
        .del-menu {
            display: none;
            position: absolute;
            bottom: 40px;
            background: rgba(30,24,60,0.97);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: 300;
            overflow: hidden;
            min-width: 170px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
        }

        .sent .del-menu { right: 0; }
        .received .del-menu { left: 0; }

        .del-menu button {
            display: block; width: 100%; padding: 12px 16px;
            border: none; background: none; color: #f1f5f9;
            text-align: left; cursor: pointer; font-size: 13px;
            font-family: 'Sora', sans-serif;
            transition: background 0.2s;
        }
        .del-menu button:hover { background: rgba(167,139,250,0.15); }
        .del-menu button + button { border-top: 1px solid var(--glass-border); }

        /* ===== FOOTER / INPUT (MIDDLE) ===== */
        .footer {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
            background: var(--footer-bg);
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .footer input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            backdrop-filter: blur(8px);
            transition: border 0.2s;
        }

        .footer input::placeholder { color: var(--subtext); }
        .footer input:focus { border-color: var(--accent); }

        .send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(167,139,250,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(167,139,250,0.6); }
        .send-btn:active { transform: scale(0.95); }

        /* ===== HEADER (BOTTOM) ===== */
        .header {
            background: var(--header-bg);
            border-top: 1px solid var(--glass-border);
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 12px rgba(167,139,250,0.4);
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.3px;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--subtext);
            margin-top: 1px;
        }

        .header-actions { display: flex; gap: 8px; }

        .btn-action {
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text);
            padding: 7px 13px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Sora', sans-serif;
            display: flex; align-items: center; gap: 5px;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .btn-action:hover { background: rgba(167,139,250,0.15); border-color: var(--accent); }

        .btn-danger { border-color: rgba(239,68,68,0.4); color: #f87171; }
        .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: #f87171; }

        /* online dot */
        .online-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body id="mainBody">

    <!-- MESSAGES (TOP) -->
    <div id="messages"></div>

    <!-- INPUT (MIDDLE) -->
    <div class="footer">
        <input type="text" id="inp" placeholder="پیغام لکھیں...">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

    <!-- HEADER (BOTTOM) -->
    <div class="header">
        <div class="header-brand">
            <div class="brand-icon">💬</div>
            <div>
                <div class="brand-name">Family Chat</div>
                <div class="brand-sub" style="display:flex;align-items:center;gap:4px;">
                    <span class="online-dot"></span> آن لائن
                </div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-action" onclick="toggleTheme()">🌓 Theme</button>
            <button class="btn-action btn-danger" onclick="clearAll()">🗑️ Clear</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = localStorage.getItem('user') || prompt("نام لکھیں:") || "Guest";
        localStorage.setItem('user', user);

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

        function clearAll() {
            if(confirm("کیا آپ تمام پیغامات مٹانا چاہتے ہیں؟")) {
                db.ref('chats').remove();
            }
        }

        function getColor(name) {
            const colors = ['#f43f5e','#a855f7','#6366f1','#0ea5e9','#10b981','#f59e0b','#ec4899','#8b5cf6'];
            return colors[name.charCodeAt(0) % colors.length];
        }

        function send() {
            let txt = document.getElementById('inp').value.trim();
            if(txt) {
                let now = new Date();
                let timeStr = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
                db.ref('chats').push({ name: user, text: txt, time: timeStr, timestamp: Date.now() });
                document.getElementById('inp').value = "";
            }
        }

        function showMenu(key) {
            document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
            document.getElementById('menu-' + key).style.display = 'block';
        }

        db.ref('chats').on('child_added', (snap) => {
            let data = snap.val();
            let key = snap.key;
            let div = document.createElement('div');
            div.id = 'msg-' + key;
            div.className = "msg " + (data.name === user ? "sent" : "received");
            div.onclick = () => showMenu(key);

            div.innerHTML = `
                <div class="avatar" style="background:${getColor(data.name)}">${data.name.charAt(0).toUpperCase()}</div>
                <div class="bubble">
                    <div class="msg-body">
                        <span class="name" style="color:${getColor(data.name)}">${data.name}</span>
                        <span class="msg-text">${data.text}</span>
                        <span class="meta">${data.time}</span>
                    </div>
                    <div id="menu-${key}" class="del-menu">
                        <button onclick="event.stopPropagation();document.getElementById('msg-${key}').remove()">❌ میرے لیے ڈیلیٹ</button>
                        ${data.name === user ? `<button onclick="event.stopPropagation();firebase.database().ref('chats/${key}').remove()">🗑️ سب کے لیے ڈیلیٹ</button>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        db.ref('chats').on('child_removed', (snap) => {
            let el = document.getElementById('msg-' + snap.key);
            if(el) el.remove();
        });

        window.onclick = (e) => {
            if (!e.target.closest('.msg')) document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
        };

        document.getElementById('inp').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
