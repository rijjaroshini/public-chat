<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #e5ddd5; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; }
        .msg-box { background: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; width: fit-content; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; background: #075e54; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="messages"></div>
<div class="input-area">
    <input type="text" id="msgInput" placeholder="Write a message...">
    <button onclick="send()">Send</button>
</div>

<script>
    // 1. Apne Firebase ki asli settings yahan paste karein
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "public-chat-app-e75fc.firebaseapp.com",
        databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
        projectId: "public-chat-app-e75fc",
        storageBucket: "public-chat-app-e75fc.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Message bhejne ka function
    function send() {
        const input = document.getElementById('msgInput');
        if(input.value.trim() !== "") {
            db.ref('chats').push({
                text: input.value,
                timestamp: Date.now()
            });
            input.value = "";
        }
    }

    // 3. Messages dikhane ka function
    db.ref('chats').on('child_added', (snapshot) => {
        const data = snapshot.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-box';
        msgDiv.innerText = data.text;
        document.getElementById('messages').appendChild(msgDiv);
        window.scrollTo(0, document.body.scrollHeight);
    });
</script>
</body>
</html>
