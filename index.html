<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Family Chat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Noto+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: 'Sora', 'Noto Sans Arabic', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        /* ===== TOP HEADER ===== */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(15,23,42,0.7);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }
        .top-header .room-name {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .top-header .room-name span.lock-icon {
            font-size: 0.9rem;
        }
        .top-header .user-chip {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .private-room-btn {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.5);
            color: #c084fc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }
        .private-room-btn:hover { background: rgba(168, 85, 247, 0.35); }

        /* ===== MODAL OVERLAY ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px 24px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: popIn 0.25s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }
        .modal-box h3 {
            font-size: 1.1rem;
            margin-bottom: 18px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .modal-field::placeholder { color: var(--text-dim); }
        .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
        .btn-primary {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 0.9rem; cursor: pointer; font-weight: 600;
        }
        .btn-cancel {
            flex: 1; padding: 12px; border: 1px solid var(--glass-border); border-radius: 12px;
            background: transparent; color: var(--text-dim); font-size: 0.9rem; cursor: pointer;
        }
        .room-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; max-height: 200px; overflow-y: auto; }
        .room-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 10px 14px; cursor: pointer;
            transition: background 0.2s;
        }
        .room-item:hover { background: rgba(255,255,255,0.1); }
        .room-item .rname { font-size: 0.9rem; font-weight: 600; }
        .room-item .rbadge {
            background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.4);
            color: #c084fc; padding: 2px 8px; border-radius: 8px; font-size: 0.65rem;
        }
        .tab-btns { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn {
            flex: 1; padding: 9px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border-color: transparent;
        }
        .tab-btn.delete-tab.active {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
        }
        .btn-danger {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white; font-size: 0.9rem; cursor: pointer; font-weight: 600;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .error-msg { color: #f87171; font-size: 0.8rem; text-align: center; margin-top: 8px; }

        /* ===== ROOM BADGE IN HEADER ===== */
        .active-room-badge {
            display: flex; align-items: center; gap: 5px;
            background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3);
            padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; color: #c084fc;
        }

        /* ===== DATE DIVIDER ===== */
        .date-divider {
            text-align: center; margin: 20px 0 10px; position: relative;
        }
        .date-divider span {
            background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 12px;
            font-size: 0.7rem; color: var(--text-dim); backdrop-filter: blur(5px);
        }

        #messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px; scrollbar-width: none;
        }
        #messages::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 82%; display: flex; flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
        .sent { align-self: flex-end; align-items: flex-end; }
        .received { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 10px 14px; border-radius: 18px; font-size: 0.95rem;
            position: relative; backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
            border: 1px solid var(--glass-border);
        }
        .sent .bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border-bottom-right-radius: 4px; border: none;
        }
        .received .bubble { background: var(--glass-bg); border-bottom-left-radius: 4px; }

        /* ✅ msg-info now shows name + date + time */
        .msg-info {
            font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; padding: 0 5px;
            display: flex; align-items: center; gap: 5px;
        }
        .msg-info .info-name { color: #c084fc; font-weight: 600; }
        .msg-info .info-sep { opacity: 0.4; }

        .input-container {
            padding: 10px 15px 5px 15px;
            background: rgba(15, 23, 42, 0.5);
        }
        .input-wrapper {
            background: rgba(30,41,59,0.9); border: 1px solid var(--glass-border);
            border-radius: 30px; display: flex; padding: 6px 6px 6px 18px;
        }
        .input-wrapper input {
            flex: 1; background: none; border: none; color: white; font-size: 0.95rem; font-family: inherit;
        }
        .send-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: white; color: var(--bg-dark); cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }
        .bottom-safe-bar { height: env(safe-area-inset-bottom, 20px); background: #0f172a; width: 100%; }

        .del-menu {
            display: none; position: absolute; bottom: 110%; right: 0;
            background: #1e293b; border: 1px solid var(--glass-border);
            border-radius: 12px; z-index: 200; width: 160px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .del-menu button {
            width: 100%; padding: 12px; border: none; background: none;
            color: white; text-align: left; font-size: 0.85rem; cursor: pointer;
            border-bottom: 1px solid var(--glass-border);
        }
        .deleted-msg { font-style: italic; opacity: 0.5; font-size: 0.85rem; }

        /* Leave room btn */
        .leave-btn {
            background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3);
            color: #f87171; padding: 5px 10px; border-radius: 12px;
            font-size: 0.7rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- TOP HEADER -->
    <div class="top-header">
        <div id="headerLeft" class="room-name">💬 Public Chat</div>
        <div style="display:flex; align-items:center; gap:8px;">
            <button class="private-room-btn" onclick="openRoomModal()">🔒 Private Room</button>
            <div class="user-chip" id="userChip">...</div>
        </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages"></div>

    <!-- INPUT -->
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="inp" placeholder="پیغام لکھیں..." autocomplete="off">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>
    <div class="bottom-safe-bar"></div>

    <!-- PRIVATE ROOM MODAL -->
    <div class="modal-overlay" id="roomModal">
        <div class="modal-box">
            <h3>🔒 Private Rooms</h3>
            <div class="tab-btns">
                <button class="tab-btn active" onclick="switchTab('join')">Join Room</button>
                <button class="tab-btn" onclick="switchTab('create')">Create Room</button>
                <button class="tab-btn delete-tab" onclick="switchTab('delete')">🗑️ Delete</button>
            </div>

            <!-- JOIN TAB -->
            <div class="tab-content active" id="tab-join">
                <div id="roomListContainer" class="room-list"></div>
                <p style="font-size:0.75rem; color:var(--text-dim); margin-bottom:10px; text-align:center;">یا Room ID اور Password درج کریں</p>
                <input class="modal-field" id="joinRoomId" placeholder="Room ID (مثلاً: family123)">
                <input class="modal-field" type="password" id="joinPassword" placeholder="Password">
                <div id="joinError" class="error-msg"></div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeRoomModal()">Cancel</button>
                    <button class="btn-primary" onclick="joinRoom()">Join ▶</button>
                </div>
            </div>

            <!-- CREATE TAB -->
            <div class="tab-content" id="tab-create">
                <input class="modal-field" id="newRoomId" placeholder="Room ID (unique نام، مثلاً: family2025)">
                <input class="modal-field" id="newRoomName" placeholder="Room Display Name">
                <input class="modal-field" type="password" id="newRoomPass" placeholder="Password سیٹ کریں">
                <div id="createError" class="error-msg"></div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeRoomModal()">Cancel</button>
                    <button class="btn-primary" onclick="createRoom()">Create ✓</button>
                </div>
            </div>

            <!-- DELETE TAB -->
            <div class="tab-content" id="tab-delete">
                <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:14px; text-align:center; line-height:1.6;">
                    ⚠️ Room delete ہونے پر تمام messages بھی ہمیشہ کے لیے مٹ جائیں گے
                </p>
                <div id="deleteRoomListContainer" class="room-list"></div>
                <input class="modal-field" id="deleteRoomId" placeholder="Room ID درج کریں">
                <input class="modal-field" type="password" id="deleteRoomPass" placeholder="وہی Password جو create میں لگایا تھا">
                <div id="deleteError" class="error-msg"></div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeRoomModal()">Cancel</button>
                    <button class="btn-danger" onclick="deleteRoom()">🗑️ Delete Room</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA89V4_KEM07f6QDYVFQPhy4vK3p8Y06Y",
            authDomain: "public-chat-app-e75fc.firebaseapp.com",
            databaseURL: "https://public-chat-app-e75fc-default-rtdb.firebaseio.com/",
            projectId: "public-chat-app-e75fc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== USER =====
        let currentUser = localStorage.getItem('user');
        if (!currentUser || currentUser === "null" || currentUser === "undefined") {
            currentUser = prompt("اپنا نام لکھیں:") || "User_" + Math.floor(Math.random() * 1000);
            localStorage.setItem('user', currentUser);
        }
        document.getElementById('userChip').textContent = "👤 " + currentUser;

        // ===== ROOM STATE =====
        let currentRoom = 'public';  // 'public' or room ID
        let currentRoomName = 'Public Chat';
        let chatRef = db.ref('chats');
        let chatListener = null;

        // ===== SWITCH CHAT ROOM =====
        function switchRoom(roomId, roomName, isPrivate) {
            // Detach old listener
            if (chatListener) chatRef.off('value', chatListener);

            currentRoom = roomId;
            currentRoomName = roomName;

            const path = isPrivate ? 'private_rooms/' + roomId + '/messages' : 'chats';
            chatRef = db.ref(path);

            const headerLeft = document.getElementById('headerLeft');
            if (isPrivate) {
                headerLeft.innerHTML = `<span class="lock-icon">🔒</span> ${roomName} <button class="leave-btn" onclick="leaveRoom()">← Leave</button>`;
            } else {
                headerLeft.innerHTML = `💬 Public Chat`;
            }

            loadMessages();
        }

        function leaveRoom() {
            switchRoom('public', 'Public Chat', false);
        }

        // ===== LOAD MESSAGES =====
        function loadMessages() {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            let lastDisplayedDate = "";

            chatListener = chatRef.orderByChild('timestamp').on('value', (snap) => {
                box.innerHTML = '';
                lastDisplayedDate = "";

                snap.forEach((child) => {
                    let data = child.val();
                    let key = child.key;
                    let dName = data.name || "Guest";
                    let dText = data.text || "";
                    let dTime = data.time || "00:00";
                    let dDate = data.date || "";
                    let isDeleted = data.isDeletedEveryone || false;

                    let userKey = currentUser.replace(/[.#$[\]]/g,'_');
                    if (data.deletedBy && data.deletedBy[userKey]) return;

                    // Date divider
                    if (dDate !== lastDisplayedDate && dDate !== "") {
                        let dateDiv = document.createElement('div');
                        dateDiv.className = "date-divider";
                        dateDiv.innerHTML = `<span>📅 ${dDate}</span>`;
                        box.appendChild(dateDiv);
                        lastDisplayedDate = dDate;
                    }

                    let isSent = dName === currentUser;
                    let div = document.createElement('div');
                    div.className = "msg " + (isSent ? "sent" : "received");

                    let displayContent = isDeleted
                        ? `<span class="deleted-msg">🚫 This message was deleted</span>`
                        : dText;

                    // ✅ msg-info: name + date + time for received, just date+time for sent
                    let infoHtml = isSent
                        ? `<span class="info-sep">📅</span><span>${dDate}</span><span class="info-sep">·</span><span>${dTime}</span>`
                        : `<span class="info-name">${dName}</span><span class="info-sep">·</span><span>📅 ${dDate}</span><span class="info-sep">·</span><span>${dTime}</span>`;

                    div.innerHTML = `
                        <div style="position:relative">
                            <div id="menu-${key}" class="del-menu">
                                <button onclick="deleteForMe('${key}')">Delete for me</button>
                                ${isSent && !isDeleted ? `<button style="color:#f87171" onclick="deleteForEveryone('${key}')">Delete for everyone</button>` : ''}
                            </div>
                            <div class="bubble" onclick="toggleMenu('${key}')">
                                ${!isSent ? `<div style="font-size:0.65rem; font-weight:bold; color:var(--secondary); margin-bottom:4px;">${dName}</div>` : ''}
                                ${displayContent}
                            </div>
                        </div>
                        <div class="msg-info">${infoHtml}</div>
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // ===== SEND MESSAGE =====
        function send() {
            let input = document.getElementById('inp');
            let text = input.value.trim();
            if (text) {
                let now = new Date();
                let timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let dateStr = now.toLocaleDateString('en-GB');
                chatRef.push({
                    name: currentUser,
                    text: text,
                    time: timeStr,
                    date: dateStr,
                    timestamp: Date.now(),
                    isDeletedEveryone: false
                });
                input.value = "";
            }
        }

        // ===== DELETE =====
        function deleteForEveryone(key) {
            chatRef.child(key).update({ text: "This message was deleted", isDeletedEveryone: true });
        }
        function deleteForMe(key) {
            let userKey = currentUser.replace(/[.#$[\]]/g,'_');
            chatRef.child(key + '/deletedBy/' + userKey).set(true);
        }
        function toggleMenu(key) {
            let menu = document.getElementById('menu-' + key);
            let isVisible = menu.style.display === 'block';
            document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
            menu.style.display = isVisible ? 'none' : 'block';
        }

        // ===== ROOM MODAL =====
        function openRoomModal() {
            document.getElementById('roomModal').classList.add('active');
            loadRoomList();
        }
        function closeRoomModal() {
            document.getElementById('roomModal').classList.remove('active');
            clearErrors();
        }
        function clearErrors() {
            document.getElementById('joinError').textContent = '';
            document.getElementById('createError').textContent = '';
            document.getElementById('deleteError').textContent = '';
        }

        // ===== LOAD DELETE ROOM LIST =====
        function loadDeleteRoomList() {
            const container = document.getElementById('deleteRoomListContainer');
            container.innerHTML = '<p style="font-size:0.75rem;color:var(--text-dim);text-align:center;">لوڈ ہو رہا ہے...</p>';
            db.ref('private_rooms').once('value', (snap) => {
                container.innerHTML = '';
                if (!snap.exists()) {
                    container.innerHTML = '<p style="font-size:0.75rem;color:var(--text-dim);text-align:center;">کوئی room موجود نہیں</p>';
                    return;
                }
                snap.forEach((child) => {
                    let roomData = child.val();
                    let roomId = child.key;
                    let item = document.createElement('div');
                    item.className = 'room-item';
                    item.style.borderColor = 'rgba(248,113,113,0.2)';
                    item.innerHTML = `<span class="rname">🔒 ${roomData.name || roomId}</span><span class="rbadge" style="color:#f87171;border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.1);">ID: ${roomId}</span>`;
                    item.onclick = () => {
                        document.getElementById('deleteRoomId').value = roomId;
                        document.getElementById('deleteRoomPass').focus();
                    };
                    container.appendChild(item);
                });
            });
        }

        // ===== DELETE ROOM =====
        function deleteRoom() {
            let roomId = document.getElementById('deleteRoomId').value.trim();
            let pass = document.getElementById('deleteRoomPass').value.trim();

            if (!roomId) { document.getElementById('deleteError').textContent = '❌ Room ID درج کریں'; return; }
            if (!pass) { document.getElementById('deleteError').textContent = '❌ Password درج کریں'; return; }

            db.ref('private_rooms/' + roomId).once('value', (snap) => {
                if (!snap.exists()) {
                    document.getElementById('deleteError').textContent = '❌ یہ room موجود نہیں';
                    return;
                }
                let data = snap.val();
                let hashed = btoa(pass + '_fcpro');
                if (data.passwordHash !== hashed) {
                    document.getElementById('deleteError').textContent = '❌ غلط Password — room delete نہیں ہوگا';
                    return;
                }
                // Password correct — delete room + all messages
                db.ref('private_rooms/' + roomId).remove().then(() => {
                    closeRoomModal();
                    // If currently in this room, go back to public
                    if (currentRoom === roomId) {
                        switchRoom('public', 'Public Chat', false);
                    }
                    // Show success toast
                    showToast('🗑️ Room "' + (data.name || roomId) + '" delete ہو گیا');
                });
            });
        }

        // ===== TOAST =====
        function showToast(msg) {
            let t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
                background:#1e293b;border:1px solid rgba(248,113,113,0.4);color:#f87171;
                padding:10px 20px;border-radius:14px;font-size:0.85rem;z-index:9999;
                animation:fadeIn 0.3s ease-out;box-shadow:0 8px 25px rgba(0,0,0,0.4)`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        function switchTab(tab) {
            const tabs = ['join','create','delete'];
            document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
            tabs.forEach(t => {
                const el = document.getElementById('tab-'+t);
                if (el) el.classList.toggle('active', t===tab);
            });
            clearErrors();
            if (tab === 'delete') loadDeleteRoomList();
        }

        // ===== LOAD ROOM LIST =====
        function loadRoomList() {
            const container = document.getElementById('roomListContainer');
            container.innerHTML = '<p style="font-size:0.75rem;color:var(--text-dim);text-align:center;">Rooms لوڈ ہو رہے ہیں...</p>';
            db.ref('private_rooms').once('value', (snap) => {
                container.innerHTML = '';
                if (!snap.exists()) {
                    container.innerHTML = '<p style="font-size:0.75rem;color:var(--text-dim);text-align:center;">ابھی کوئی room نہیں۔ پہلا room بنائیں!</p>';
                    return;
                }
                snap.forEach((child) => {
                    let roomData = child.val();
                    let roomId = child.key;
                    let item = document.createElement('div');
                    item.className = 'room-item';
                    item.innerHTML = `<span class="rname">🔒 ${roomData.name || roomId}</span><span class="rbadge">Private</span>`;
                    item.onclick = () => {
                        document.getElementById('joinRoomId').value = roomId;
                        document.getElementById('joinPassword').focus();
                    };
                    container.appendChild(item);
                });
            });
        }

        // ===== CREATE ROOM =====
        function createRoom() {
            let roomId = document.getElementById('newRoomId').value.trim().replace(/[^a-zA-Z0-9_-]/g,'');
            let roomName = document.getElementById('newRoomName').value.trim();
            let pass = document.getElementById('newRoomPass').value.trim();

            if (!roomId) { document.getElementById('createError').textContent = '❌ Room ID درج کریں (صرف letters/numbers)'; return; }
            if (!roomName) { document.getElementById('createError').textContent = '❌ Room Name درج کریں'; return; }
            if (!pass) { document.getElementById('createError').textContent = '❌ Password درج کریں'; return; }

            db.ref('private_rooms/' + roomId).once('value', (snap) => {
                if (snap.exists()) {
                    document.getElementById('createError').textContent = '❌ یہ Room ID پہلے سے موجود ہے';
                    return;
                }
                // Simple hash (not cryptographic, for demo)
                let hashed = btoa(pass + '_fcpro');
                db.ref('private_rooms/' + roomId).set({
                    name: roomName,
                    passwordHash: hashed,
                    createdBy: currentUser,
                    createdAt: Date.now()
                }).then(() => {
                    closeRoomModal();
                    switchRoom(roomId, roomName, true);
                });
            });
        }

        // ===== JOIN ROOM =====
        function joinRoom() {
            let roomId = document.getElementById('joinRoomId').value.trim();
            let pass = document.getElementById('joinPassword').value.trim();

            if (!roomId) { document.getElementById('joinError').textContent = '❌ Room ID درج کریں'; return; }
            if (!pass) { document.getElementById('joinError').textContent = '❌ Password درج کریں'; return; }

            db.ref('private_rooms/' + roomId).once('value', (snap) => {
                if (!snap.exists()) {
                    document.getElementById('joinError').textContent = '❌ یہ room موجود نہیں';
                    return;
                }
                let data = snap.val();
                let hashed = btoa(pass + '_fcpro');
                if (data.passwordHash !== hashed) {
                    document.getElementById('joinError').textContent = '❌ غلط Password';
                    return;
                }
                closeRoomModal();
                switchRoom(roomId, data.name, true);
            });
        }

        // ===== INIT =====
        loadMessages();

        document.getElementById('inp').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
        window.onclick = (e) => { 
            if (!e.target.closest('.bubble')) document.querySelectorAll('.del-menu').forEach(m => m.style.display = 'none');
            if (e.target === document.getElementById('roomModal')) closeRoomModal();
        };
    </script>
</body>
</html>
